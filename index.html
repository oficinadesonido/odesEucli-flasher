<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>odesEucli — Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 32px;
    }
    h1 { font-size: 1.4rem; letter-spacing: 0.15em; color: #fff; }
    p  { font-size: 0.85rem; color: #888; max-width: 380px; text-align: center; line-height: 1.6; }
    esp-web-install-button::part(button) {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px 28px;
      font-family: monospace;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 0.08em;
    }
    esp-web-install-button::part(button):hover {
      border-color: #666;
    }
    .version { font-size: 0.75rem; color: #444; }
  </style>
</head>
<body>
  <h1>odesEucli</h1>
  <p>Conecta el dispositivo por USB, haz clic en el botón e instala el firmware.<br>Requiere Chrome o Edge.</p>
  <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
  <span class="version">v2.0.0 — ESP32-S3</span>
</body>
</html>
